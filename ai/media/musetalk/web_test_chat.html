<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI Review Board — 대화형 스트리밍 테스트</title>
<style>
  :root {
    --accent: #5b6cf7;
    --accent-dark: #4453e0;
    --bg: #eef0f5;
    --call-bg: #0e0f13;
    --tile-bg: #17181d;
    --text: #1c1e26;
    --muted: #8a8f9c;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: "Segoe UI", -apple-system, "Malgun Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
  }
  #app {
    width: 100%;
    max-width: 960px;
    height: 100vh;
    display: flex;
    flex-direction: row;
    background: #fff;
    box-shadow: 0 0 24px rgba(0,0,0,0.08);
  }
  #leftPane {
    flex: 1; min-width: 0;
    display: flex; flex-direction: column;
  }
  #rightPane {
    flex: none; width: 300px;
    display: flex; flex-direction: column;
    border-left: 1px solid #eceef2;
  }

  #topbar {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px;
    background: #fff;
    border-bottom: 1px solid #eceef2;
  }
  #topbar .brand {
    font-size: 13px; font-weight: 700; color: var(--text);
    white-space: nowrap; margin-right: 2px;
  }
  #apiUrl {
    flex: 1; min-width: 0;
    padding: 8px 10px; font-size: 12px;
    border: 1px solid #dfe2ea; border-radius: 8px;
    outline: none; background: #f7f8fb; color: var(--text);
  }
  #apiUrl:focus { border-color: var(--accent); background: #fff; }
  #connectBtn {
    padding: 8px 14px; font-size: 12px; font-weight: 600;
    border: none; border-radius: 8px; cursor: pointer;
    background: var(--accent); color: #fff;
  }
  #connectBtn:hover { background: var(--accent-dark); }

  #callArea {
    flex: 1; min-height: 0;
    background: var(--call-bg);
    padding: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #videoTile {
    position: relative;
    height: 100%;
    max-width: 100%;
    aspect-ratio: 9 / 16;
    background: var(--tile-bg);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 8px 24px rgba(0,0,0,0.35);
  }
  #stageVideo {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    background: var(--tile-bg);
  }
  .tile-badge {
    position: absolute;
    font-size: 11px;
    padding: 5px 10px;
    border-radius: 999px;
    background: rgba(0,0,0,0.55);
    color: #fff;
    backdrop-filter: blur(4px);
    max-width: calc(100% - 24px);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  #speakerLabel {
    left: 10px; bottom: 10px;
    font-weight: 600;
    display: flex; align-items: center; gap: 6px;
  }
  #speakerLabel::before {
    content: ""; width: 7px; height: 7px; border-radius: 50%;
    background: #3ddc84; flex: none;
    box-shadow: 0 0 0 2px rgba(61,220,132,0.25);
  }
  #speakerLabel.mode-idle::before { background: #8a8f9c; box-shadow: none; }
  #stageStatus {
    right: 10px; top: 10px;
    color: #ffd479;
    display: none;
  }
  #stageStatus:not(:empty) { display: block; }

  #chatLog {
    flex: 1; min-height: 0; overflow-y: auto;
    padding: 12px 14px;
    display: flex; flex-direction: column; gap: 10px;
    background: var(--bg);
  }
  .line { display: flex; gap: 8px; align-items: flex-start; }
  .avatar {
    flex: none; width: 28px; height: 28px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    color: #fff; font-size: 12px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  .bubble-content { max-width: 78%; }
  .line .speaker { font-size: 11px; color: var(--muted); margin-bottom: 3px; font-weight: 600; }
  .line .text {
    font-size: 13.5px; color: var(--text); line-height: 1.45;
    background: #fff; padding: 8px 12px; border-radius: 4px 14px 14px 14px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.06);
  }

  #inputArea {
    display: flex; gap: 8px; align-items: flex-end;
    padding: 10px 14px 14px;
    background: #fff;
    border-top: 1px solid #eceef2;
  }
  #text {
    flex: 1; resize: none; max-height: 100px; min-height: 40px;
    padding: 10px 14px; font-size: 14px;
    border: 1px solid #dfe2ea; border-radius: 20px;
    outline: none; font-family: inherit;
    background: #f7f8fb;
  }
  #text:focus { border-color: var(--accent); background: #fff; }
  #sendBtn {
    flex: none; width: 40px; height: 40px; border-radius: 50%;
    border: none; cursor: pointer;
    background: var(--accent); color: #fff;
    font-size: 16px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
  }
  #sendBtn:hover { background: var(--accent-dark); }
  #sendBtn:active { transform: scale(0.94); }

  #debugLog {
    flex: none; max-height: 16vh; overflow-y: auto;
    padding: 6px 10px;
    font-family: Consolas, monospace; font-size: 10.5px; line-height: 1.5;
    background: #14151a; color: #9fe6a0;
    border-top: 1px solid #2a2c33;
  }
  #debugLog div.err { color: #ff8a8a; }
</style>
</head>
<body>
<div id="app">
  <div id="leftPane">
    <div id="topbar">
      <span class="brand">위원회 회의실</span>
      <input id="apiUrl" type="text" placeholder="https://xxxx.trycloudflare.com" />
      <button id="connectBtn">연결</button>
    </div>

    <div id="callArea">
      <div id="videoTile">
        <video id="stageVideo" muted playsinline></video>
        <div id="speakerLabel" class="tile-badge mode-idle">대기 중</div>
        <div id="stageStatus" class="tile-badge"></div>
      </div>
    </div>
  </div>

  <div id="rightPane">
    <div id="chatLog"></div>

    <div id="debugLog"></div>

    <div id="inputArea">
      <textarea id="text" placeholder="위원 발언을 입력하고 Enter (Shift+Enter 줄바꿈)">시장 진입 전략은 탄탄한데, 수익 모델 부분은 좀 더 구체화가 필요해 보입니다.</textarea>
      <button id="sendBtn" aria-label="전송">➤</button>
    </div>
  </div>
</div>

<script>
// 회의실 화면처럼 영상은 위쪽 타일 하나만 크게 표시하고(새 발언이 오면 그 자리에서 교체),
// 발언 내용은 아래에 채팅 로그(자막 이력)처럼 누적된다.
const MIME_CODEC = 'video/mp4; codecs="avc1.42E01E, mp4a.40.2"';
// streaming_optimization.md 시도 10에서 확정된 값
const RESUME_THRESHOLD = 0.8;
const PAUSE_THRESHOLD = 0.15;
const SPEAKER_NAME = "사업전략 전문가";

// 대기 루프 영상은 Colab 서버까지 안 가고 저장소에 이미 있는 로컬 파일을 그대로 쓴다
// (web_test_chat.html 기준 상대경로) - 서버 연결/네트워크와 무관하게 즉시 재생 가능.
// 실제 위원 발언(MuseTalk 생성) 스트리밍만 서버 연결이 필요하다.
const IDLE_LOOP_PATH = "../assets/persona_a/avata_rf.mp4";

const apiUrlEl = document.getElementById("apiUrl");
const connectBtn = document.getElementById("connectBtn");
const textEl = document.getElementById("text");
const sendBtn = document.getElementById("sendBtn");
const stageVideo = document.getElementById("stageVideo");
const speakerLabel = document.getElementById("speakerLabel");
const stageStatus = document.getElementById("stageStatus");
const chatLog = document.getElementById("chatLog");
const debugLog = document.getElementById("debugLog");

const dlogT0 = performance.now();
function dlog(msg, isErr) {
  const line = document.createElement("div");
  if (isErr) line.className = "err";
  line.textContent = `[${((performance.now() - dlogT0) / 1000).toFixed(1)}s] ${msg}`;
  debugLog.appendChild(line);
  debugLog.scrollTop = debugLog.scrollHeight;
}

// stageVideo는 페이지에 하나뿐인 고정 엘리먼트를 계속 재사용하므로(영상이 여러 개
// 쌓이지 않고 한 자리에서 교체됨), web_test_stream_mse.html에서 겪었던 "클릭마다
// 리스너 누적" 문제를 피하려고 이 리스너들은 한 번만 등록한다.
let monitorTimer = null;
let activeToken = 0; // 전송 도중 새 메시지가 오면 이전 스트림의 콜백을 무시하기 위한 토큰
let currentMode = "idle"; // "idle"(대기 루프 재생 중) | "streaming"(위원 발언 스트리밍 중)

// MediaError.code 숫자만으로는 원인을 알기 어려워서, 콘솔(F12) 없이도 화면에서
// 바로 원인을 알 수 있도록 사람이 읽을 수 있는 설명 + 실제로 시도한 URL을 같이 보여준다.
const MEDIA_ERROR_MESSAGES = {
  1: "로딩이 중단됨(MEDIA_ERR_ABORTED)",
  2: "네트워크 에러(MEDIA_ERR_NETWORK) - 서버 주소나 CORS 확인 필요",
  3: "디코딩 실패(MEDIA_ERR_DECODE)",
  4: "지원하지 않는 형식/찾을 수 없음(MEDIA_ERR_SRC_NOT_SUPPORTED) - 대기 루프면 ai/media/assets/persona_a/avata_rf.mp4 로컬 파일 경로 확인, 스트리밍이면 서버 주소 확인",
};
stageVideo.addEventListener("playing", () => { stageStatus.textContent = ""; dlog("video playing"); });
stageVideo.addEventListener("waiting", () => dlog("video waiting(버퍼링)"));
stageVideo.addEventListener("stalled", () => dlog("video stalled"));
stageVideo.addEventListener("error", () => {
  const err = stageVideo.error;
  const detail = err ? (MEDIA_ERROR_MESSAGES[err.code] || `코드 ${err.code}`) : "알 수 없음";
  stageStatus.textContent = `영상 에러: ${detail} | URL: ${stageVideo.currentSrc || "(없음)"}`;
  dlog(`video error: ${detail}`, true);
});
// 발언 스트림(MSE) 재생이 자연스럽게 끝났을 때만 대기 루프로 복귀한다.
// 대기 루프 자체는 loop=true라 "ended"가 아예 발생하지 않는다.
stageVideo.addEventListener("ended", () => {
  if (currentMode !== "streaming") return;
  dlog("스트림 재생 종료 -> 대기 루프로 복귀");
  playIdleLoop();
});

function setMode(mode) {
  currentMode = mode;
  speakerLabel.classList.toggle("mode-idle", mode === "idle");
}

function playIdleLoop() {
  setMode("idle");
  if (monitorTimer) clearInterval(monitorTimer);
  stageVideo.loop = true;
  stageVideo.muted = true; // 대기 루프는 원래 무음 트랙(-an)이라 상관없지만, 스트리밍 중 풀었던 음소거를 되돌려 놓음
  stageVideo.src = IDLE_LOOP_PATH;
  speakerLabel.textContent = "대기 중";
  stageStatus.textContent = "";
  stageVideo.play().catch((e) => {
    stageStatus.textContent = `play() 실패: ${e.message}`;
    dlog(`대기 루프 play() 실패: ${e.message}`, true);
  });
}

// 로컬 파일이라 서버 연결과 무관하게 페이지 열리자마자 바로 재생
playIdleLoop();

// "연결" 버튼은 API 주소가 실제로 살아있는지 확인하는 용도로만 남김
connectBtn.addEventListener("click", () => {
  const apiUrl = apiUrlEl.value.trim().replace(/\/$/, "");
  if (!apiUrl) { alert("API 서버 주소를 입력하세요."); return; }
  fetch(apiUrl + "/health")
    .then((r) => r.json())
    .then((j) => alert("서버 연결 확인됨: " + JSON.stringify(j)))
    .catch((e) => alert("서버 연결 실패: " + e.message));
});

function sendMessage() {
  const apiUrl = apiUrlEl.value.trim().replace(/\/$/, "");
  const text = textEl.value.trim();
  if (!apiUrl) { alert("API 서버 주소를 입력하세요."); return; }
  if (!text) return;
  if (!("MediaSource" in window) || !MediaSource.isTypeSupported(MIME_CODEC)) {
    alert("이 브라우저는 MediaSource/코덱을 지원하지 않습니다 (크롬 권장).");
    return;
  }
  textEl.value = "";
  appendChatLine(SPEAKER_NAME, text);
  streamToStage(apiUrl, text);
}

sendBtn.addEventListener("click", sendMessage);
textEl.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

function appendChatLine(speaker, text) {
  const line = document.createElement("div");
  line.className = "line";
  line.innerHTML = `
    <div class="avatar"></div>
    <div class="bubble-content">
      <div class="speaker"></div>
      <div class="text"></div>
    </div>
  `;
  line.querySelector(".avatar").textContent = speaker.slice(0, 1);
  line.querySelector(".speaker").textContent = speaker;
  line.querySelector(".text").textContent = text;
  chatLog.appendChild(line);
  chatLog.scrollTop = chatLog.scrollHeight;
}

function streamToStage(apiUrl, text) {
  const token = ++activeToken; // 이 스트림이 아직 "최신"인지 콜백에서 확인하는 용도
  if (monitorTimer) clearInterval(monitorTimer);

  let mediaSource = null;
  let sourceBuffer = null;
  let switched = false; // 첫 바이너리 데이터가 오기 전까지는 대기 루프를 계속 보여준다 (문제1)
  const appendQueue = [];
  let appending = false;
  let streamDone = false;

  function isStale() {
    return token !== activeToken;
  }

  function pump() {
    if (isStale() || appending || appendQueue.length === 0 || !sourceBuffer || sourceBuffer.updating) return;
    appending = true;
    const chunk = appendQueue.shift();
    try {
      sourceBuffer.appendBuffer(chunk);
    } catch (e) {
      appending = false;
      dlog(`appendBuffer 에러: ${e.message}`, true);
    }
  }

  function maybeEndStream() {
    if (
      !isStale() &&
      streamDone &&
      appendQueue.length === 0 &&
      sourceBuffer &&
      !sourceBuffer.updating &&
      mediaSource &&
      mediaSource.readyState === "open"
    ) {
      try { mediaSource.endOfStream(); } catch (e) { /* 재생엔 영향 없음 - 조용히 무시 */ }
    }
  }

  function bufferedAhead() {
    if (!sourceBuffer || sourceBuffer.buffered.length === 0) return 0;
    try {
      const idx = sourceBuffer.buffered.length - 1;
      return sourceBuffer.buffered.end(idx) - stageVideo.currentTime;
    } catch (e) {
      return 0;
    }
  }

  function monitorBuffer() {
    if (isStale()) { clearInterval(monitorTimer); return; }
    if (!switched) return; // 아직 대기 루프가 재생 중이면 버퍼 감시할 필요 없음
    const ahead = bufferedAhead();
    if (stageVideo.paused) {
      if (ahead >= RESUME_THRESHOLD || (streamDone && ahead > 0.05)) {
        dlog(`재생 시작(buffered=${ahead.toFixed(2)}s)`);
        stageVideo.play().catch((e) => dlog(`play() 실패: ${e.message}`, true));
      }
    } else if (ahead < PAUSE_THRESHOLD && !streamDone) {
      stageVideo.pause();
      dlog(`버퍼 부족(${ahead.toFixed(2)}s) - 일시정지, ${RESUME_THRESHOLD}s 쌓이면 재개`);
    }
  }
  monitorTimer = setInterval(monitorBuffer, 200);

  // 대기 루프 -> 발언 화면 전환은 첫 바이너리 데이터가 실제로 도착했을 때만 한다.
  // 그 전까지(TTS 생성 등 대기 시간)는 대기 루프가 끊기지 않고 계속 재생된다.
  function switchToStream() {
    switched = true;
    setMode("streaming");
    stageVideo.loop = false; // 스트림은 끝나면 ended 이벤트로 대기 루프에 복귀해야 함
    stageVideo.muted = false; // 발화 오디오를 들려야 하므로 음소거 해제 - 전송 버튼 클릭(사용자 제스처) 직후라 자동재생 정책에 안 걸림 (문제2)
    speakerLabel.textContent = SPEAKER_NAME;
    stageStatus.textContent = "";
    dlog("첫 스트림 데이터 도착 -> 대기 루프에서 전환");

    mediaSource = new MediaSource();
    stageVideo.src = URL.createObjectURL(mediaSource);
    mediaSource.addEventListener("sourceopen", () => {
      if (isStale()) return;
      sourceBuffer = mediaSource.addSourceBuffer(MIME_CODEC);
      sourceBuffer.mode = "sequence";
      sourceBuffer.addEventListener("updateend", () => {
        appending = false;
        pump();
        maybeEndStream();
      });
      sourceBuffer.addEventListener("error", () => {
        appending = false;
        dlog("SourceBuffer 에러", true);
        pump();
      });
      pump(); // 전환 전에 이미 큐에 쌓여있던 첫 청크(들)를 흘려보냄
    });
  }

  const wsUrl = apiUrl.replace(/^https:/, "wss:").replace(/^http:/, "ws:") + "/generate-stream";
  dlog(`연결 시도: ${wsUrl}`);
  const ws = new WebSocket(wsUrl);
  ws.binaryType = "arraybuffer";

  ws.onopen = () => {
    if (isStale()) { ws.close(); return; }
    dlog("WebSocket 연결됨, 요청 전송");
    ws.send(JSON.stringify({
      speaker_id: "business_strategy",
      speaker_name: SPEAKER_NAME,
      order: 1,
      text: text,
      emotion: "serious",
    }));
  };

  ws.onmessage = (event) => {
    if (isStale()) return;
    if (typeof event.data === "string") {
      const msg = JSON.parse(event.data);
      if (msg.type === "status") {
        dlog("상태: " + msg.message);
      } else if (msg.type === "done") {
        streamDone = true;
        dlog(`서버 전송 완료(elapsed=${msg.elapsed}s)`);
        maybeEndStream();
      } else if (msg.type === "error") {
        stageStatus.textContent = "에러: " + msg.message;
        dlog("서버 에러: " + msg.message, true);
      }
    } else {
      if (!switched) switchToStream();
      appendQueue.push(event.data);
      pump();
    }
  };

  ws.onerror = () => {
    if (!isStale()) {
      stageStatus.textContent = "WebSocket 에러 (콘솔 확인)";
      dlog("WebSocket 에러", true);
    }
  };
}
</script>
</body>
</html>
